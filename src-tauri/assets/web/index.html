<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />
  <title>Daily Planner — Mobile</title>
  <style>
    :root {
      --bg: #0F1117; --surface: #161B22; --border: #30363D;
      --text: #E6EDF3; --muted: #8B949E; --dim: #484F58;
      --blue: #58A6FF; --green: #3FB950; --red: #F85149;
      --amber: #D29922; --purple: #BC8CFF; --teal: #39D353;
      --radius: 10px; --gap: 12px;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
    html, body { height: 100%; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: var(--bg); color: var(--text); }
    #app { display: flex; flex-direction: column; height: 100%; max-width: 480px; margin: 0 auto; }
    /* Nav */
    #nav { display: flex; border-top: 1px solid var(--border); background: var(--surface); }
    .nav-btn { flex: 1; padding: 10px 4px 8px; display: flex; flex-direction: column; align-items: center; gap: 3px; font-size: 10px; color: var(--muted); border: none; background: none; cursor: pointer; }
    .nav-btn.active { color: var(--blue); }
    .nav-btn svg { width: 22px; height: 22px; }
    /* Main */
    #main { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
    .page { display: none; padding: var(--gap); }
    .page.active { display: block; }
    /* Cards */
    .card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: var(--gap); margin-bottom: var(--gap); }
    h2 { font-size: 15px; font-weight: 600; margin-bottom: var(--gap); }
    /* Buttons */
    .btn { display: inline-flex; align-items: center; gap: 6px; padding: 9px 16px; border-radius: 8px; font-size: 14px; font-weight: 500; border: none; cursor: pointer; }
    .btn-primary { background: var(--blue); color: #0F1117; }
    .btn-ghost { background: transparent; color: var(--muted); border: 1px solid var(--border); }
    .btn-danger { background: transparent; color: var(--red); border: 1px solid rgba(248,81,73,.3); }
    .btn:disabled { opacity: .45; cursor: not-allowed; }
    .btn-sm { padding: 6px 12px; font-size: 12px; }
    .w-full { width: 100%; justify-content: center; }
    /* Inputs */
    input, textarea, select {
      width: 100%; background: var(--bg); border: 1px solid var(--border); border-radius: 8px;
      color: var(--text); font-size: 14px; padding: 10px 12px; outline: none; font-family: inherit;
    }
    input:focus, textarea:focus, select:focus { border-color: var(--blue); }
    label { display: block; font-size: 12px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }
    /* Tasks */
    .task-item { display: flex; align-items: flex-start; gap: 10px; padding: 12px; background: var(--bg); border: 1px solid var(--border); border-radius: 8px; margin-bottom: 8px; }
    .task-check { width: 20px; height: 20px; border-radius: 50%; border: 2px solid var(--border); background: none; cursor: pointer; flex-shrink: 0; margin-top: 1px; }
    .task-check.done { background: var(--green); border-color: var(--green); }
    .task-title { flex: 1; font-size: 14px; line-height: 1.4; }
    .task-title.done { text-decoration: line-through; color: var(--muted); }
    .task-meta { display: flex; gap: 6px; margin-top: 4px; }
    .badge { font-size: 10px; padding: 2px 6px; border-radius: 4px; background: rgba(88,166,255,.1); color: var(--blue); font-weight: 500; }
    /* Session */
    .phase-badge { display: inline-block; padding: 4px 10px; border-radius: 20px; font-size: 12px; font-weight: 600; }
    .time-display { font-size: 48px; font-weight: 700; letter-spacing: -2px; text-align: center; margin: 16px 0; }
    /* Prompt */
    .sse-output { background: var(--bg); border: 1px solid var(--border); border-radius: 8px; padding: 10px; font-size: 12px; font-family: monospace; max-height: 300px; overflow-y: auto; color: var(--muted); white-space: pre-wrap; word-break: break-word; }
    .sse-line { margin-bottom: 2px; }
    /* Status indicators */
    .dot { width: 8px; height: 8px; border-radius: 50%; display: inline-block; }
    .dot-green { background: var(--green); }
    .dot-amber { background: var(--amber); }
    /* Grid */
    .grid2 { display: grid; grid-template-columns: 1fr 1fr; gap: var(--gap); }
    .stat { text-align: center; }
    .stat-val { font-size: 28px; font-weight: 700; }
    .stat-lbl { font-size: 11px; color: var(--muted); margin-top: 2px; }
    /* Empty */
    .empty { text-align: center; color: var(--muted); font-size: 13px; padding: 32px 0; }
    /* Add task form */
    #add-task-form { display: none; }
    #add-task-form.open { display: flex; flex-direction: column; gap: 10px; }
    /* Toast */
    #toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%); background: var(--surface); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; font-size: 13px; opacity: 0; transition: opacity .3s; pointer-events: none; z-index: 999; white-space: nowrap; }
    #toast.show { opacity: 1; }
    /* Task detail */
    .detail-back-row { display:flex; align-items:center; justify-content:space-between; margin-bottom:12px; }
    .detail-task-info { padding:12px; background:var(--bg); border:1px solid var(--border); border-radius:8px; margin-bottom:4px; }
    .detail-task-title { font-size:16px; font-weight:600; line-height:1.3; }
    .detail-task-notes { font-size:13px; color:var(--muted); margin-top:6px; line-height:1.4; }
    .spinner { display:inline-block; width:14px; height:14px; border:2px solid var(--border); border-top-color:var(--blue); border-radius:50%; animation:spin .7s linear infinite; vertical-align:middle; }
    @keyframes spin { to { transform:rotate(360deg); } }
    .task-item-tappable { flex:1; cursor:pointer; }
    .task-item-tappable:active { opacity:.7; }
  </style>
</head>
<body>
<div id="app">
  <div id="main">
    <!-- Tasks Page -->
    <div class="page active" id="page-tasks">
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:12px;">
          <h2 style="margin:0">Today's Tasks</h2>
          <div style="display:flex;gap:8px;align-items:center;">
            <input type="date" id="task-date" style="width:auto;padding:4px 8px;font-size:12px;" />
            <button class="btn btn-ghost btn-sm" onclick="toggleAddTask()">+ Add</button>
          </div>
        </div>
        <div id="add-task-form">
          <input type="text" id="new-task-title" placeholder="Task title..." />
          <div style="display:flex;gap:8px;">
            <select id="new-task-slot" style="flex:1;">
              <option value="1">Session 1</option>
              <option value="2">Session 2</option>
            </select>
            <button class="btn btn-primary btn-sm" onclick="createTask()">Add</button>
            <button class="btn btn-ghost btn-sm" onclick="toggleAddTask()">Cancel</button>
          </div>
        </div>
      </div>
      <div id="task-list"><div class="empty">Loading...</div></div>
    </div>

    <!-- Prompt Page -->
    <div class="page" id="page-prompt">
      <div class="card">
        <h2>Prompt Pipeline</h2>
        <div style="margin-bottom:12px;">
          <label>Provider</label>
          <select id="prompt-provider">
            <option value="claude">Claude</option>
            <option value="opencode">OpenCode</option>
            <option value="codex">Codex</option>
          </select>
        </div>
        <div style="margin-bottom:12px;">
          <label>Project Path (optional)</label>
          <input type="text" id="prompt-project-path" placeholder="/path/to/project" />
        </div>
        <div style="margin-bottom:12px;">
          <label>Prompt</label>
          <textarea id="prompt-input" rows="5" placeholder="Write your prompt..."></textarea>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-ghost w-full" id="btn-improve" onclick="runImprove()">✨ Improve Prompt</button>
          <button class="btn btn-primary w-full" id="btn-run" onclick="runPrompt()" disabled>▶ Run</button>
        </div>
      </div>

      <div class="card" id="improve-output-card" style="display:none;">
        <h2>Improved Prompt</h2>
        <textarea id="improved-prompt" rows="8" style="font-family:monospace;font-size:12px;"></textarea>
        <div style="display:flex;gap:8px;margin-top:8px;">
          <button class="btn btn-ghost btn-sm" onclick="copyImproved()">Copy</button>
          <button class="btn btn-primary btn-sm" onclick="useImproved()">Use this prompt</button>
        </div>
        <div id="improve-sse" class="sse-output" style="display:none;margin-top:8px;"></div>
      </div>

      <div class="card" id="run-output-card" style="display:none;">
        <h2>Run Output</h2>
        <div id="run-sse" class="sse-output"></div>
      </div>
    </div>

    <!-- Task Detail Page -->
    <div class="page" id="page-task-detail">
      <div class="card">
        <div class="detail-back-row">
          <button class="btn btn-ghost btn-sm" onclick="goBackToTasks()">← Back</button>
          <span id="td-type-badge" class="badge" style="font-size:11px;"></span>
        </div>
        <div class="detail-task-info">
          <div class="detail-task-title" id="td-title"></div>
          <div class="detail-task-notes" id="td-notes" style="display:none;"></div>
          <div id="td-path" style="display:none;font-size:11px;color:var(--dim);margin-top:4px;font-family:monospace;"></div>
        </div>
      </div>

      <div class="card">
        <div style="margin-bottom:12px;">
          <label>Template</label>
          <select id="td-template-select" onchange="applyDetailTemplate(this.value)">
            <option value="">— No template —</option>
          </select>
        </div>
        <div style="margin-bottom:12px;">
          <label>Provider</label>
          <select id="td-provider">
            <option value="claude">Claude</option>
            <option value="opencode">OpenCode</option>
            <option value="codex">Codex</option>
          </select>
        </div>
        <div style="margin-bottom:12px;">
          <label>Raw Prompt</label>
          <textarea id="td-prompt" rows="5" placeholder="Describe what you want to do..."></textarea>
        </div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <button class="btn btn-ghost w-full" id="td-btn-improve" onclick="detailRunImprove()">✨ Improve</button>
          <button class="btn btn-ghost btn-sm" id="td-btn-reset" onclick="detailReset()" style="display:none;">🔄 Reset</button>
        </div>
      </div>

      <div class="card" id="td-improved-card" style="display:none;">
        <h2>Improved Prompt</h2>
        <textarea id="td-improved" rows="8" style="font-family:monospace;font-size:12px;"></textarea>
        <div style="display:flex;gap:8px;margin-top:8px;flex-wrap:wrap;">
          <button class="btn btn-ghost btn-sm" onclick="detailCopy()">Copy</button>
          <button class="btn btn-ghost btn-sm" onclick="detailSaveToTask()">Save to Task</button>
          <button class="btn btn-primary btn-sm" onclick="detailRunPrompt()">▶ Run</button>
        </div>
      </div>

      <div class="card" id="td-run-output-card" style="display:none;">
        <h2>Run Output</h2>
        <div id="td-run-sse" class="sse-output"></div>
        <button class="btn btn-primary w-full" id="td-btn-done" onclick="detailMarkDone()" style="margin-top:12px;">✓ Mark Done</button>
      </div>
    </div>

    <!-- Session Page -->
    <div class="page" id="page-session">
      <div class="card" style="text-align:center;">
        <div id="phase-badge" class="phase-badge" style="background:rgba(88,166,255,.15);color:#58A6FF;">Loading…</div>
        <div class="time-display" id="current-time">--:--</div>
        <div id="session-detail" style="color:var(--muted);font-size:13px;"></div>
      </div>
      <div class="card grid2">
        <div class="stat"><div class="stat-val" id="sess1-time">S1</div><div class="stat-lbl">Session 1 start</div></div>
        <div class="stat"><div class="stat-val" id="sess2-time">S2</div><div class="stat-lbl">Session 2 start</div></div>
      </div>
      <div class="card">
        <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:8px;">
          <span style="font-size:13px;font-weight:600;">Today's Tasks</span>
          <span id="task-progress" style="font-size:12px;color:var(--muted);"></span>
        </div>
        <div id="session-task-list"></div>
      </div>
    </div>
  </div>

  <!-- Bottom Nav -->
  <div id="nav">
    <button class="nav-btn active" onclick="switchPage('tasks', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/></svg>
      Tasks
    </button>
    <button class="nav-btn" onclick="switchPage('prompt', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 0 1-2 2H7l-4 4V5a2 2 0 0 1 2-2h14a2 2 0 0 1 2 2z"/></svg>
      Prompt
    </button>
    <button class="nav-btn" onclick="switchPage('session', this)">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
      Session
    </button>
    <button class="nav-btn" id="nav-btn-detail" onclick="switchPage('task-detail', this)" style="display:none;">
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M8 12h8M8 8h8M8 16h5"/></svg>
      Detail
    </button>
  </div>
</div>

<div id="toast"></div>

<script>
const API = '';

// ── Utilities ──────────────────────────────────────────────────────────────

function showToast(msg, dur = 2200) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  setTimeout(() => el.classList.remove('show'), dur);
}

function today() {
  const d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

async function apiFetch(path, opts = {}) {
  const r = await fetch(API + path, opts);
  if (!r.ok) { const t = await r.text(); throw new Error(t); }
  return r.json();
}

// ── Navigation ─────────────────────────────────────────────────────────────

function switchPage(name, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + name).classList.add('active');
  btn.classList.add('active');
  if (name === 'tasks') loadTasks();
  if (name === 'session') loadSession();
}

// ── Tasks ──────────────────────────────────────────────────────────────────

let taskDateInput;
document.addEventListener('DOMContentLoaded', () => {
  taskDateInput = document.getElementById('task-date');
  taskDateInput.value = today();
  taskDateInput.addEventListener('change', loadTasks);
  loadTasks();
  startClock();
});

async function loadTasks() {
  const date = taskDateInput.value || today();
  try {
    const tasks = await apiFetch('/api/tasks?date=' + date);
    renderTasks(tasks);
    // Update session page summary too
    renderSessionTasks(tasks);
    const done = tasks.filter(t => t.status === 'done').length;
    document.getElementById('task-progress').textContent = done + '/' + tasks.length + ' done';
  } catch (e) {
    document.getElementById('task-list').innerHTML = '<div class="empty">Failed to load tasks</div>';
  }
}

function renderTasks(tasks) {
  const el = document.getElementById('task-list');
  if (!tasks.length) { el.innerHTML = '<div class="empty">No tasks for this day</div>'; return; }
  el.innerHTML = tasks.map(t => `
    <div class="task-item" id="task-${t.id}">
      <button class="task-check ${t.status==='done'?'done':''}" onclick="toggleTask('${t.id}','${t.status}')"></button>
      <div class="task-item-tappable" onclick="openTaskDetail('${t.id}')">
        <div class="task-title ${t.status==='done'?'done':''}">${escHtml(t.title)}</div>
        <div class="task-meta">
          <span class="badge">${t.task_type}</span>
          <span class="badge" style="background:rgba(61,185,80,.1);color:#3FB950;">S${t.session_slot}</span>
          ${t.notes ? '<span class="badge" style="background:rgba(188,140,255,.1);color:#BC8CFF;">notes</span>' : ''}
          ${t.prompt_used ? '<span class="badge" style="background:rgba(88,166,255,.1);color:#58A6FF;">prompt</span>' : ''}
        </div>
      </div>
      <button onclick="deleteTaskUI('${t.id}')" style="background:none;border:none;color:var(--dim);font-size:16px;cursor:pointer;padding:2px 4px;">×</button>
    </div>`).join('');
}

function renderSessionTasks(tasks) {
  const el = document.getElementById('session-task-list');
  if (!tasks || !tasks.length) { el.innerHTML = '<div class="empty" style="padding:12px 0;">No tasks today</div>'; return; }
  el.innerHTML = tasks.slice(0,6).map(t => `
    <div style="display:flex;align-items:center;gap:8px;padding:6px 0;border-bottom:1px solid var(--border);">
      <span class="dot ${t.status==='done'?'dot-green':'dot-amber'}"></span>
      <span style="font-size:13px;flex:1;${t.status==='done'?'text-decoration:line-through;color:var(--muted);':''}">${escHtml(t.title)}</span>
      <span style="font-size:11px;color:var(--dim);">S${t.session_slot}</span>
    </div>`).join('');
}

async function toggleTask(id, currentStatus) {
  const newStatus = currentStatus === 'done' ? 'pending' : 'done';
  try {
    await apiFetch('/api/tasks/' + id, { method: 'PATCH', headers: {'Content-Type':'application/json'}, body: JSON.stringify({status: newStatus}) });
    loadTasks();
  } catch(e) { showToast('Failed: ' + e.message); }
}

async function deleteTaskUI(id) {
  try {
    await apiFetch('/api/tasks/' + id, { method: 'DELETE', headers: {'Content-Type':'application/json'} });
    loadTasks();
    showToast('Task deleted');
  } catch(e) { showToast('Failed: ' + e.message); }
}

function toggleAddTask() {
  const f = document.getElementById('add-task-form');
  f.classList.toggle('open');
  if (f.classList.contains('open')) document.getElementById('new-task-title').focus();
}

async function createTask() {
  const title = document.getElementById('new-task-title').value.trim();
  if (!title) { showToast('Title is required'); return; }
  const slot = parseInt(document.getElementById('new-task-slot').value);
  const date = taskDateInput.value || today();
  try {
    await apiFetch('/api/tasks', { method: 'POST', headers: {'Content-Type':'application/json'},
      body: JSON.stringify({date, session_slot: slot, title}) });
    document.getElementById('new-task-title').value = '';
    toggleAddTask();
    loadTasks();
    showToast('Task added');
  } catch(e) { showToast('Failed: ' + e.message); }
}

// ── Prompt pipeline ─────────────────────────────────────────────────────────

let improvedText = '';

async function runImprove() {
  const prompt = document.getElementById('prompt-input').value.trim();
  if (!prompt) { showToast('Enter a prompt first'); return; }
  const provider = document.getElementById('prompt-provider').value;
  const projectPath = document.getElementById('prompt-project-path').value.trim();

  const outCard = document.getElementById('improve-output-card');
  const sseEl = document.getElementById('improve-sse');
  const btnImprove = document.getElementById('btn-improve');

  outCard.style.display = 'block';
  sseEl.style.display = 'block';
  sseEl.innerHTML = '';
  improvedText = '';
  btnImprove.disabled = true;
  document.getElementById('improved-prompt').value = '';

  try {
    const body = { prompt, provider };
    if (projectPath) body.project_path = projectPath;
    const res = await fetch(API + '/api/prompt/improve', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const data = line.slice(6);
          improvedText += data + '\n';
          const div = document.createElement('div');
          div.className = 'sse-line';
          div.textContent = data;
          sseEl.appendChild(div);
          sseEl.scrollTop = sseEl.scrollHeight;
        }
      }
    }
    document.getElementById('improved-prompt').value = improvedText.trim();
    sseEl.style.display = 'none';
    document.getElementById('btn-run').disabled = false;
    showToast('Improve complete');
  } catch(e) {
    sseEl.innerHTML += '<div style="color:var(--red);">Error: ' + escHtml(e.message) + '</div>';
  } finally {
    btnImprove.disabled = false;
  }
}

function copyImproved() {
  navigator.clipboard.writeText(document.getElementById('improved-prompt').value);
  showToast('Copied!');
}

function useImproved() {
  document.getElementById('prompt-input').value = document.getElementById('improved-prompt').value;
  improvedText = '';
  document.getElementById('improve-output-card').style.display = 'none';
}

async function runPrompt() {
  const prompt = document.getElementById('improved-prompt').value.trim()
    || document.getElementById('prompt-input').value.trim();
  if (!prompt) { showToast('No prompt to run'); return; }
  const provider = document.getElementById('prompt-provider').value;
  const projectPath = document.getElementById('prompt-project-path').value.trim();

  const outCard = document.getElementById('run-output-card');
  const sseEl = document.getElementById('run-sse');
  const btnRun = document.getElementById('btn-run');

  outCard.style.display = 'block';
  sseEl.innerHTML = '';
  btnRun.disabled = true;

  try {
    const body = { prompt, provider };
    if (projectPath) body.project_path = projectPath;
    const res = await fetch(API + '/api/prompt/run', { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(body) });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const div = document.createElement('div');
          div.className = 'sse-line';
          div.textContent = line.slice(6);
          sseEl.appendChild(div);
          sseEl.scrollTop = sseEl.scrollHeight;
        }
      }
    }
    showToast('Run complete');
  } catch(e) {
    sseEl.innerHTML += '<div style="color:var(--red);">Error: ' + escHtml(e.message) + '</div>';
  } finally {
    btnRun.disabled = false;
  }
}

// ── Session ─────────────────────────────────────────────────────────────────

async function loadSession() {
  try {
    const s = await apiFetch('/api/session');
    document.getElementById('phase-badge').textContent = s.phase_label;
    document.getElementById('sess1-time').textContent = s.session1_kickstart;
    document.getElementById('sess2-time').textContent = s.session2_start;

    const colors = {
      pre_session: 'rgba(88,166,255,.15);color:#58A6FF',
      session1: 'rgba(61,185,80,.15);color:#3FB950',
      break: 'rgba(210,153,34,.15);color:#D29922',
      session2: 'rgba(188,140,255,.15);color:#BC8CFF',
    };
    const badge = document.getElementById('phase-badge');
    const c = colors[s.phase] || colors.pre_session;
    badge.style.cssText = `background:${c.split(';')[0]};color:${c.split(':')[1]};padding:4px 10px;border-radius:20px;font-size:12px;font-weight:600;display:inline-block;`;
    badge.textContent = s.phase_label;

    document.getElementById('session-detail').textContent =
      'Planning ends: ' + s.planning_end + '  ·  Session 2: ' + s.session2_start;
  } catch(e) {
    document.getElementById('phase-badge').textContent = 'Offline';
  }
}

function startClock() {
  function tick() {
    const now = new Date();
    document.getElementById('current-time').textContent =
      String(now.getHours()).padStart(2,'0') + ':' + String(now.getMinutes()).padStart(2,'0');
  }
  tick();
  setInterval(tick, 10000);
  // Refresh session every 5 minutes
  setInterval(() => {
    if (document.getElementById('page-session').classList.contains('active')) loadSession();
  }, 300000);
}

// ── Task Detail ──────────────────────────────────────────────────────────────

let currentTask = null;
let detailTemplates = [];

function goBackToTasks() {
  const tasksBtn = document.querySelector('#nav .nav-btn');
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-tasks').classList.add('active');
  tasksBtn.classList.add('active');
  document.getElementById('nav-btn-detail').style.display = 'none';
  loadTasks();
}

async function openTaskDetail(taskId) {
  try {
    const task = await apiFetch('/api/tasks/' + taskId);
    currentTask = task;

    // Populate header
    document.getElementById('td-title').textContent = task.title;
    document.getElementById('td-type-badge').textContent = task.task_type;

    const notesEl = document.getElementById('td-notes');
    if (task.notes) {
      notesEl.textContent = task.notes;
      notesEl.style.display = 'block';
    } else {
      notesEl.style.display = 'none';
    }

    // Pre-fill prompt from saved data
    document.getElementById('td-prompt').value = task.prompt_used || '';

    // Reset improved section
    document.getElementById('td-improved-card').style.display = 'none';
    document.getElementById('td-run-output-card').style.display = 'none';
    document.getElementById('td-btn-reset').style.display = 'none';
    document.getElementById('td-improved').value = task.prompt_result || '';
    document.getElementById('td-run-sse').innerHTML = '';
    document.getElementById('td-btn-improve').disabled = false;
    document.getElementById('td-btn-improve').textContent = '✨ Improve';

    // Show improved section if task has a saved result
    if (task.prompt_result) {
      document.getElementById('td-improved-card').style.display = 'block';
      document.getElementById('td-btn-reset').style.display = 'inline-flex';
    }

    // Load templates
    await loadDetailTemplates();

    // Navigate to detail page
    document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.getElementById('page-task-detail').classList.add('active');
    const detailBtn = document.getElementById('nav-btn-detail');
    detailBtn.style.display = 'flex';
    detailBtn.classList.add('active');
  } catch(e) {
    showToast('Failed to open task: ' + e.message);
  }
}

async function loadDetailTemplates() {
  try {
    const templates = await apiFetch('/api/prompt/templates');
    detailTemplates = templates;
    const sel = document.getElementById('td-template-select');
    sel.innerHTML = '<option value="">— No template —</option>';
    templates.forEach(t => {
      const opt = document.createElement('option');
      opt.value = t.id;
      opt.textContent = t.name;
      sel.appendChild(opt);
    });
  } catch(e) {
    // templates not critical
  }
}

function applyDetailTemplate(templateId) {
  if (!templateId) return;
  const tpl = detailTemplates.find(t => t.id === templateId);
  if (tpl) document.getElementById('td-prompt').value = tpl.content;
}

async function detailRunImprove() {
  const prompt = document.getElementById('td-prompt').value.trim();
  if (!prompt) { showToast('Enter a prompt first'); return; }
  const provider = document.getElementById('td-provider').value;

  const btnImprove = document.getElementById('td-btn-improve');
  btnImprove.disabled = true;
  btnImprove.innerHTML = '<span class="spinner"></span> Improving…';

  const improvedCard = document.getElementById('td-improved-card');
  const improvedEl = document.getElementById('td-improved');
  improvedCard.style.display = 'block';
  improvedEl.value = '';

  let collected = '';
  try {
    const body = { prompt, provider };
    if (currentTask) {
      body.task_context = { title: currentTask.title, notes: currentTask.notes || '' };
    }
    const res = await fetch(API + '/api/prompt/improve', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          collected += line.slice(6) + '\n';
          improvedEl.value = collected.trimEnd();
        }
      }
    }
    improvedEl.value = collected.trim();
    document.getElementById('td-btn-reset').style.display = 'inline-flex';
    showToast('Improve complete');
  } catch(e) {
    showToast('Improve failed: ' + e.message);
    if (!collected) improvedCard.style.display = 'none';
  } finally {
    btnImprove.disabled = false;
    btnImprove.textContent = '✨ Improve';
  }
}

function detailReset() {
  document.getElementById('td-improved-card').style.display = 'none';
  document.getElementById('td-improved').value = '';
  document.getElementById('td-btn-reset').style.display = 'none';
}

function detailCopy() {
  navigator.clipboard.writeText(document.getElementById('td-improved').value);
  showToast('Copied!');
}

async function detailSaveToTask() {
  if (!currentTask) return;
  const promptUsed = document.getElementById('td-prompt').value.trim();
  const promptResult = document.getElementById('td-improved').value.trim();
  try {
    await apiFetch('/api/tasks/' + currentTask.id, {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ prompt_used: promptUsed, prompt_result: promptResult })
    });
    currentTask = { ...currentTask, prompt_used: promptUsed, prompt_result: promptResult };
    showToast('Saved to task');
  } catch(e) {
    showToast('Save failed: ' + e.message);
  }
}

async function detailRunPrompt() {
  const improved = document.getElementById('td-improved').value.trim();
  const raw = document.getElementById('td-prompt').value.trim();
  const prompt = improved || raw;
  if (!prompt) { showToast('No prompt to run'); return; }
  const provider = document.getElementById('td-provider').value;

  const outCard = document.getElementById('td-run-output-card');
  const sseEl = document.getElementById('td-run-sse');
  outCard.style.display = 'block';
  sseEl.innerHTML = '<div style="color:var(--muted);font-size:11px;">Running…</div>';

  const body = { prompt, provider };
  try {
    const res = await fetch(API + '/api/prompt/run', {
      method: 'POST',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify(body)
    });
    sseEl.innerHTML = '';
    const reader = res.body.getReader();
    const decoder = new TextDecoder();
    let buf = '';
    while (true) {
      const { done, value } = await reader.read();
      if (done) break;
      buf += decoder.decode(value, { stream: true });
      const lines = buf.split('\n');
      buf = lines.pop();
      for (const line of lines) {
        if (line.startsWith('data: ')) {
          const div = document.createElement('div');
          div.className = 'sse-line';
          div.textContent = line.slice(6);
          sseEl.appendChild(div);
          sseEl.scrollTop = sseEl.scrollHeight;
        }
      }
    }
    showToast('Run complete');
  } catch(e) {
    sseEl.innerHTML += '<div style="color:var(--red);">Error: ' + escHtml(e.message) + '</div>';
  }
}

async function detailMarkDone() {
  if (!currentTask) return;
  try {
    await apiFetch('/api/tasks/' + currentTask.id + '/status', {
      method: 'PATCH',
      headers: {'Content-Type':'application/json'},
      body: JSON.stringify({ status: 'done' })
    });
    showToast('Task marked done!');
    currentTask = null;
    goBackToTasks();
  } catch(e) {
    showToast('Failed: ' + e.message);
  }
}

// ── Helpers ─────────────────────────────────────────────────────────────────

function escHtml(str) {
  return String(str).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
